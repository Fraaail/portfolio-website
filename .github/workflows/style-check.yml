name: Style and Formatting Check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  style-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check Markdown style
        run: npx --yes markdownlint-cli2 "**/*.md" "!assets/**" "!pc_portfolio/**" "!portfolio_pc/**"

      - name: Check formatting for maintained text files
        run: npx --yes prettier --check index.html README.md CONTRIBUTING.md "docs/**/*.md" ".github/workflows/*.yml"
