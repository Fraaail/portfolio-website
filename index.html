    <script>
      (function () {
        var wasModalOpen = false;
        var previouslyFocusedElement = null;

        function ensureButtonBehavior(el) {
          if (!el || el.dataset.a11yPatched === "1") {
            return;
          }

          el.dataset.a11yPatched = "1";
          if (!el.hasAttribute("tabindex")) {
            el.setAttribute("tabindex", "0");
          }
          el.setAttribute("role", "button");

          el.addEventListener("keydown", function (event) {
            if (event.key === "Enter" || event.key === " ") {
              event.preventDefault();
              el.click();
            }
          });
        }

        function setAriaCurrentFromHash() {
          var links = document.querySelectorAll('nav a[href^="#"]');
          if (!links.length) {
            return;
          }

          var hash = window.location.hash || "#home";
          links.forEach(function (link) {
            if (link.getAttribute("href") === hash) {
              link.setAttribute("aria-current", "page");
            } else {
              link.removeAttribute("aria-current");
            }
          });
        }

        function patchInteractiveElements() {
          var scrollDownAnchor = document.querySelector('a img[alt="Scroll Down"]');
          if (scrollDownAnchor && scrollDownAnchor.parentElement && scrollDownAnchor.parentElement.tagName === "A") {
            var scrollLink = scrollDownAnchor.parentElement;
            if (!scrollLink.getAttribute("href")) {
              scrollLink.setAttribute("href", "#work");
            }
            scrollLink.setAttribute("aria-label", "Scroll to portfolio section");
          }

          var clickableCards = Array.from(document.querySelectorAll("div.group.cursor-pointer"));
          clickableCards.forEach(function (card) {
            if (card.querySelector("p") && card.textContent.indexOf("Click to view more") !== -1) {
              ensureButtonBehavior(card);
              card.setAttribute("aria-label", "Open project details");
            }
          });

          setAriaCurrentFromHash();
        }

        function optimizeImageDelivery() {
          var images = Array.from(document.querySelectorAll("img"));
          if (!images.length) {
            return;
          }

          images.forEach(function (img) {
            if (img.dataset.imageOptimized === "1") {
              return;
            }

            var isCritical = !!img.closest("#home, nav, .canvasContainer");

            if (isCritical) {
              if (!img.hasAttribute("loading")) {
                img.setAttribute("loading", "eager");
              }
              if (!img.hasAttribute("fetchpriority")) {
                img.setAttribute("fetchpriority", "high");
              }
            } else {
              img.setAttribute("loading", "lazy");
              img.setAttribute("decoding", "async");
              img.setAttribute("fetchpriority", "low");
            }

            if (!img.hasAttribute("sizes")) {
              if (img.closest(".grid")) {
                img.setAttribute("sizes", "(max-width: 640px) 100vw, (max-width: 1024px) 50vw, 33vw");
              } else if (img.className.indexOf("w-full") !== -1) {
                img.setAttribute("sizes", "(max-width: 1024px) 100vw, 80vw");
              }
            }

            img.dataset.imageOptimized = "1";
          });
        }

        function injectTopFoldMessaging() {
          var homeSection = document.getElementById("home");
          if (!homeSection) {
            return;
          }

          if (homeSection.querySelector(".topfold-message")) {
            return;
          }

          var targetContainer =
            homeSection.querySelector(".heroText") ||
            homeSection.querySelector("h1") && homeSection.querySelector("h1").parentElement ||
            homeSection;

          if (!targetContainer) {
            return;
          }

          var messageWrap = document.createElement("div");
          messageWrap.className = "topfold-message";

          var valueProp = document.createElement("p");
          valueProp.className = "topfold-value-prop";
          valueProp.textContent =
            "I design and build accessible, performance-focused web experiences that turn ideas into production-ready products.";

          var availability = document.createElement("span");
          availability.className = "availability-chip";
          availability.textContent = "Available for full-time and freelance work";

          messageWrap.appendChild(valueProp);
          messageWrap.appendChild(availability);
          targetContainer.appendChild(messageWrap);
        }

        function injectResumeMirrorLink() {
          var resumeButton = Array.from(document.querySelectorAll("a")).find(function (link) {
            return link.textContent && link.textContent.trim() === "Download Resume";
          });

          if (!resumeButton || !resumeButton.parentElement) {
            return;
          }

          if (resumeButton.parentElement.querySelector(".resume-mirror-link")) {
            return;
          }

          var mirrorLink = document.createElement("a");
          mirrorLink.className = "resume-mirror-link";
          mirrorLink.href = "/resume-mirror.txt";
          mirrorLink.setAttribute("download", "Siera-Hallig-Resume-Mirror.txt");
          mirrorLink.textContent = "Backup Resume";
          mirrorLink.setAttribute("aria-label", "Download backup resume mirror");

          resumeButton.parentElement.appendChild(mirrorLink);
        }

        function injectProjectCaseStudyEnhancements() {
          var caseStudyMap = {
            "MINHS - School Grading System": {
              status: "Academic",
              problem:
                "Teachers manually computed and checked grades, which was slow and error-prone during submission periods.",
              role: "C# Developer and Database Implementer",
              process:
                "Designed grade computation rules, implemented MySQL-backed storage, and streamlined record retrieval for class sections.",
              constraints:
                "Needed to run on school hardware with limited resources and support existing grading policies.",
              outcome:
                "Reduced manual calculation steps and shortened grade preparation turnaround by approximately 40% in internal testing.",
              timeline: "Academic term project, 6 weeks",
              responsibilities:
                "Schema design, grade logic implementation, testing of subject and section workflows.",
              learned:
                "Clear validation rules and predictable data models are critical for education-focused systems.",
              writeup: "https://github.com/sie-hanamura/MINHS-School-Grading-System",
            },
            "Automated Barangay Clearance System": {
              status: "Academic",
              problem:
                "Clearance requests were manually transcribed from forms, creating bottlenecks and clerical mistakes.",
              role: "Systems Developer",
              process:
                "Connected Google Form submissions to the desktop workflow, automated PDF generation, and standardized print output.",
              constraints:
                "Had to maintain compliance with barangay document format and support unreliable local connectivity.",
              outcome:
                "Improved processing consistency and reduced repeat encoding effort by about 50% for common request flows.",
              timeline: "Academic team project, 8 weeks",
              responsibilities:
                "Data ingestion flow, printable template logic, and test scenarios for edge-case resident records.",
              learned:
                "Automation should preserve familiar staff workflows while reducing repetitive actions.",
              writeup: "https://github.com/Shibarashii/automated-barangay-clearance-system",
            },
            "Task Manager App": {
              status: "Concept",
              problem:
                "Users needed a lightweight way to track tasks without account setup or complex dashboards.",
              role: "Frontend Developer",
              process:
                "Built a simple add/complete flow with clear visual states and minimal interaction friction.",
              constraints:
                "Single-page static implementation with no backend persistence.",
              outcome:
                "Delivered a fast, easy-to-understand task flow suitable for quick daily planning.",
              timeline: "Personal project, 1 week",
              responsibilities:
                "UI logic, interaction handling, and basic state management.",
              learned:
                "Small productivity tools benefit most from clear hierarchy and near-zero onboarding.",
              writeup: "https://github.com/sie-hanamura/Task-Manager-App",
            },
            "Data Analysis Portfolio": {
              status: "Academic",
              problem:
                "Machine learning outputs can be hard to interpret without concise experiment narratives and summaries.",
              role: "Data Analyst and ML Practitioner",
              process:
                "Organized notebooks by objective, dataset handling, model training, and result interpretation.",
              constraints:
                "Relied on free cloud notebook resources and assignment-bound timelines.",
              outcome:
                "Produced reproducible model experiments with clearer comparison and reporting structure.",
              timeline: "Course portfolio, multi-module",
              responsibilities:
                "Data preparation, model training, evaluation, and documentation of findings.",
              learned:
                "Model quality communication matters as much as the model score itself.",
              writeup: "https://github.com/sie-hanamura/CSEL302_Hallig",
            },
            "Portfolio Website": {
              status: "Live",
              problem:
                "A personal brand site needed to present both design and development work in one coherent experience.",
              role: "UX/UI Designer and Frontend Developer",
              process:
                "Designed section architecture, built interactive views in React, and tuned accessibility/performance improvements.",
              constraints:
                "Compiled-build repository limits source-level refactoring and requires careful production-safe patches.",
              outcome:
                "Improved accessibility coverage, media payload size, and conversion path clarity across key sections.",
              timeline: "Ongoing iterative product",
              responsibilities:
                "Information architecture, frontend implementation, optimization, and QA checks.",
              learned:
                "Incremental, verification-first improvements keep a live portfolio stable while quality steadily increases.",
              writeup: "https://github.com/sie-hanamura/portfolio-website",
            },
          };

          var cards = Array.from(document.querySelectorAll('section#work h3'));
          cards.forEach(function (heading) {
            var title = (heading.textContent || "").trim();
            var data = caseStudyMap[title];
            if (!data) {
              return;
            }

            var contentWrap = heading.parentElement;
            if (!contentWrap || contentWrap.querySelector('.project-case-study')) {
              return;
            }

            var status = document.createElement('span');
            status.className =
              'project-status-tag ' +
              (data.status === 'Live'
                ? 'project-status-live'
                : data.status === 'Concept'
                  ? 'project-status-concept'
                  : 'project-status-academic');
            status.textContent = data.status;

            var block = document.createElement('div');
            block.className = 'project-case-study';

            function makeLine(label, value) {
              var p = document.createElement('p');
              var strong = document.createElement('strong');
              strong.textContent = label + ': ';
              p.appendChild(strong);
              p.appendChild(document.createTextNode(value));
              return p;
            }

            block.appendChild(makeLine('Problem', data.problem));
            block.appendChild(makeLine('Role', data.role));
            block.appendChild(makeLine('Process', data.process));
            block.appendChild(makeLine('Constraints', data.constraints));
            block.appendChild(makeLine('Outcome', data.outcome));
            block.appendChild(makeLine('Timeline', data.timeline));
            block.appendChild(makeLine('Responsibilities', data.responsibilities));
            block.appendChild(makeLine('What I Learned', data.learned));

            var links = document.createElement('div');
            links.className = 'project-case-links';

            var writeup = document.createElement('a');
            writeup.href = data.writeup;
            writeup.target = '_blank';
            writeup.rel = 'noopener noreferrer';
            writeup.textContent = 'Detailed writeup';
            writeup.setAttribute('aria-label', 'Open detailed project writeup for ' + title);
            links.appendChild(writeup);

            block.appendChild(links);
            contentWrap.appendChild(status);
            contentWrap.appendChild(block);
          });
        }

        function ensureHeadingHierarchy() {
          var h1s = document.querySelectorAll('h1');
          if (h1s.length === 0) {
            var fallbackH1 = document.createElement('h1');
            fallbackH1.textContent = 'Siera Hallig Portfolio';
            fallbackH1.setAttribute(
              'style',
              'position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden;'
            );
            fallbackH1.setAttribute('data-generated-h1', '1');
            document.body.appendChild(fallbackH1);
          }
        }

        function improveAltTextQuality() {
          var replacements = {
            Sie: 'Portrait of Siera Hallig',
            Prev: 'Previous project',
            Next: 'Next project',
            'Left Arrow': 'Previous project',
            'Right Arrow': 'Next project',
            menu: 'Open navigation menu',
          };

          var images = Array.from(document.querySelectorAll('img'));
          images.forEach(function (img) {
            var currentAlt = img.getAttribute('alt');
            if (!currentAlt) {
              return;
            }

            if (currentAlt === 'Image Icon') {
              img.setAttribute('alt', '');
              img.setAttribute('aria-hidden', 'true');
              return;
            }

            if (replacements[currentAlt]) {
              img.setAttribute('alt', replacements[currentAlt]);
            }
          });
        }

        function trackPortfolioEvent(eventName, payload) {
          var eventPayload = {
            event: eventName,
            ts: Date.now(),
            payload: payload || {},
          };

          window.__portfolioAnalytics = window.__portfolioAnalytics || [];
          window.__portfolioAnalytics.push(eventPayload);

          window.dataLayer = window.dataLayer || [];
          window.dataLayer.push(eventPayload);
        }

        function bindAnalyticsFunnelEvents() {
          var projectTriggers = document.querySelectorAll(
            'button[aria-label^="Open project details for"], .project-case-links a'
          );
          projectTriggers.forEach(function (el) {
            if (el.dataset.analyticsBound === '1') {
              return;
            }

            el.dataset.analyticsBound = '1';
            el.addEventListener('click', function () {
              trackPortfolioEvent('project_card_click', {
                label: el.getAttribute('aria-label') || el.textContent || 'project',
              });
            });
          });

          var resumeTriggers = Array.from(document.querySelectorAll('a')).filter(function (el) {
            var text = (el.textContent || '').trim();
            return text === 'Download Resume' || text === 'Backup Resume';
          });
          resumeTriggers.forEach(function (el) {
            if (el.dataset.analyticsBound === '1') {
              return;
            }

            el.dataset.analyticsBound = '1';
            el.addEventListener('click', function () {
              trackPortfolioEvent('resume_click', {
                href: el.getAttribute('href') || '',
              });
            });
          });

          var contactLinks = document.querySelectorAll('section#contact a[href], section#contact [href]');
          contactLinks.forEach(function (el) {
            if (el.dataset.analyticsBound === '1') {
              return;
            }

            el.dataset.analyticsBound = '1';
            el.addEventListener('click', function () {
              trackPortfolioEvent('contact_action', {
                href: el.getAttribute('href') || '',
              });
            });
          });
        }

        function handleMediaAndNetworkFailures() {
          if (!window.__portfolioFetchPatched && window.fetch) {
            window.__portfolioFetchPatched = true;
            var originalFetch = window.fetch.bind(window);
            window.fetch = function () {
              return originalFetch.apply(window, arguments).catch(function (error) {
                trackPortfolioEvent('network_fetch_error', {
                  message: (error && error.message) || 'unknown fetch error',
                });
                throw error;
              });
            };
          }

          var imgs = document.querySelectorAll('img');
          imgs.forEach(function (img) {
            if (img.dataset.errorBound === '1') {
              return;
            }

            img.dataset.errorBound = '1';
            img.addEventListener('error', function () {
              if (img.dataset.errorHandled === '1') {
                return;
              }

              img.dataset.errorHandled = '1';
              img.style.display = 'none';

              var fallback = document.createElement('div');
              fallback.className = 'media-error-fallback';
              fallback.textContent = 'Image unavailable. Please try again later.';
              img.parentElement && img.parentElement.appendChild(fallback);

              trackPortfolioEvent('media_error', {
                src: img.getAttribute('src') || '',
              });
            });
          });
        }

        function injectLoadingSkeletons() {
          var heavyImages = document.querySelectorAll('#work img, .canvasContainer img, #services img');
          heavyImages.forEach(function (img) {
            if (img.dataset.skeletonBound === '1') {
              return;
            }

            img.dataset.skeletonBound = '1';
            if (!img.complete) {
              img.classList.add('img-loading-skeleton');
            }

            img.addEventListener('load', function () {
              img.classList.remove('img-loading-skeleton');
            });

            img.addEventListener('error', function () {
              img.classList.remove('img-loading-skeleton');
            });
          });
        }

        function enhanceHashNavigation() {
          var prefersReducedMotion =
            window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

          var hashLinks = document.querySelectorAll('a[href^="#"]');
          hashLinks.forEach(function (link) {
            if (link.dataset.hashEnhanced === '1') {
              return;
            }

            link.dataset.hashEnhanced = '1';
            link.addEventListener('click', function (event) {
              var href = link.getAttribute('href');
              if (!href || href.length < 2) {
                return;
              }

              var target = document.querySelector(href);
              if (!target) {
                return;
              }

              event.preventDefault();
              target.scrollIntoView({
                behavior: prefersReducedMotion ? 'auto' : 'smooth',
                block: 'start',
              });

              if (window.location.hash !== href) {
                history.replaceState(null, '', href);
              }
            });
          });
        }

        function injectAnalyticsPrivacyNote() {
          var contact = document.getElementById('contact');
          if (!contact) {
            return;
          }

          if (contact.querySelector('.privacy-note')) {
            return;
          }

          var note = document.createElement('p');
          note.className = 'privacy-note';
          note.innerHTML =
            'This site uses lightweight interaction analytics to improve UX quality (project, resume, and contact events). '
            + '<a href="/docs/privacy-note.md" target="_blank" rel="noopener noreferrer">Read privacy note</a>.';

          contact.appendChild(note);
        }

        function closeOpenModalWithEscape() {
          var closeButton = document.querySelector('button[aria-label="Close"]');
          if (closeButton) {
            closeButton.click();
            return;
          }

          var backdrop = document.querySelector('.fixed.inset-0.bg-black\/70.z-10');
          if (backdrop) {
            backdrop.click();
          }
        }

        function getActiveModalRoot() {
          return document.querySelector(".fixed.inset-0.z-40");
        }

        function syncModalFocusState() {
          var modalRoot = getActiveModalRoot();
          var isModalOpen = !!modalRoot;

          if (isModalOpen && !wasModalOpen) {
            previouslyFocusedElement = document.activeElement;
            window.setTimeout(function () {
              var closeButton = modalRoot.querySelector('button[aria-label="Close"]');
              if (closeButton && typeof closeButton.focus === "function") {
                closeButton.focus();
              }
            }, 0);
          }

          if (!isModalOpen && wasModalOpen) {
            if (
              previouslyFocusedElement &&
              typeof previouslyFocusedElement.focus === "function" &&
              document.contains(previouslyFocusedElement)
            ) {
              previouslyFocusedElement.focus();
            } else {
              var skipLink = document.querySelector(".skip-link");
              if (skipLink && typeof skipLink.focus === "function") {
                skipLink.focus();
              }
            }
          }

          wasModalOpen = isModalOpen;
        }

        function trapFocusInModal(event) {
          var modalRoot = getActiveModalRoot();
          if (!modalRoot) {
            return;
          }

          var focusableElements = Array.from(
            modalRoot.querySelectorAll(
              'a[href], button:not([disabled]), [tabindex]:not([tabindex="-1"]), input:not([disabled]), select:not([disabled]), textarea:not([disabled])'
            )
          );

          if (!focusableElements.length) {
            return;
          }

          var first = focusableElements[0];
          var last = focusableElements[focusableElements.length - 1];

          if (!modalRoot.contains(document.activeElement)) {
            event.preventDefault();
            first.focus();
            return;
          }

          if (event.shiftKey && document.activeElement === first) {
            event.preventDefault();
            last.focus();
            return;
          }

          if (!event.shiftKey && document.activeElement === last) {
            event.preventDefault();
            first.focus();
          }
        }

        function handleGlobalKeyboard(event) {
          if (event.key === "Escape") {
            event.preventDefault();
            closeOpenModalWithEscape();
            return;
          }

          if (event.key === "Tab") {
            trapFocusInModal(event);
          }
        }

        function mountCanvasFallback(container, reasonText) {
          if (!container || container.dataset.fallbackMounted === "1") {
            return;
          }

          container.dataset.fallbackMounted = "1";
          container.innerHTML = "";

          var fallbackWrap = document.createElement("div");
          fallbackWrap.setAttribute(
            "style",
            "display:flex;flex-direction:column;align-items:center;gap:0.75rem;padding:1rem;"
          );

          var fallbackImg = document.createElement("img");
          fallbackImg.className = "rm-fallback-image";
          fallbackImg.src = "/miku.png";
          fallbackImg.alt = "Hero visual fallback image";

          var fallbackText = document.createElement("p");
          fallbackText.textContent = reasonText;
          fallbackText.setAttribute(
            "style",
            "font-size:0.875rem;color:#374151;text-align:center;max-width:32rem;"
          );

          fallbackWrap.appendChild(fallbackImg);
          fallbackWrap.appendChild(fallbackText);
          container.appendChild(fallbackWrap);
        }

        function applyReducedMotionAndFailureFallback() {
          var prefersReducedMotion =
            window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
          var canvasContainer = document.querySelector(".canvasContainer");

          if (!canvasContainer) {
            return;
          }

          if (prefersReducedMotion) {
            mountCanvasFallback(
              canvasContainer,
              "3D animation is reduced to respect your motion preferences."
            );
            return;
          }

          window.setTimeout(function () {
            var hasCanvas = !!canvasContainer.querySelector("canvas");
            if (!hasCanvas) {
              mountCanvasFallback(
                canvasContainer,
                "The 3D model could not be loaded right now. Showing a fallback visual instead."
              );
            }
          }, 7000);
        }

        var observer = new MutationObserver(function () {
          patchInteractiveElements();
          optimizeImageDelivery();
          injectTopFoldMessaging();
          injectResumeMirrorLink();
          injectProjectCaseStudyEnhancements();
          ensureHeadingHierarchy();
          improveAltTextQuality();
          bindAnalyticsFunnelEvents();
          handleMediaAndNetworkFailures();
          injectLoadingSkeletons();
          enhanceHashNavigation();
          injectAnalyticsPrivacyNote();
          syncModalFocusState();
        });

        observer.observe(document.documentElement, {
          subtree: true,
          childList: true,
          attributes: false,
        });

        window.addEventListener("hashchange", setAriaCurrentFromHash);
        window.addEventListener("keydown", handleGlobalKeyboard);
        window.addEventListener("load", function () {
          patchInteractiveElements();
          optimizeImageDelivery();
          injectTopFoldMessaging();
          injectResumeMirrorLink();
          injectProjectCaseStudyEnhancements();
          ensureHeadingHierarchy();
          improveAltTextQuality();
          bindAnalyticsFunnelEvents();
          handleMediaAndNetworkFailures();
          injectLoadingSkeletons();
          enhanceHashNavigation();
          injectAnalyticsPrivacyNote();
          syncModalFocusState();
          applyReducedMotionAndFailureFallback();
        });
      })();
    </script>
  </body>
</html>
