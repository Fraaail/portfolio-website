    <style>
      :root {
        color-scheme: light;
      }

      .skip-link {
        position: absolute;
        left: 0.75rem;
        top: -3rem;
        z-index: 10000;
        padding: 0.625rem 0.875rem;
        border: 2px solid #1f2937;
        background: #ffffff;
        color: #111827;
        border-radius: 0.375rem;
        text-decoration: none;
        transition: top 0.15s ease;
      }

      .skip-link:focus {
        top: 0.75rem;
      }

      a:focus-visible,
      button:focus-visible,
      [role="button"]:focus-visible,
      [tabindex]:focus-visible {
        outline: 3px solid #0f766e;
        outline-offset: 3px;
      }

      .portfolioHeadText {
        font-size: 7rem !important;

      .rm-fallback-image {
        width: min(420px, 80vw);
        height: auto;
        border-radius: 0.75rem;
        border: 2px solid #4b5563;

      }

      .section-cta-wrap {
        margin-top: 1rem;
        width: 100%;
        display: flex;
        justify-content: center;
      }

      .section-cta {
        display: inline-flex;

        background: #ffffff;
        color: #0f172a;
        font-size: 0.9rem;
        font-weight: 600;
        line-height: 1;
        text-decoration: none;
        transition: background-color 0.2s ease, color 0.2s ease, transform 0.2s ease;
      }

      .section-cta:hover {
        background: #0f766e;
        color: #ffffff;
        transform: translateY(-1px);
      }

      .topfold-message {
        margin-top: 0.85rem;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 0.5rem;
      }

      .topfold-value-prop {
        margin: 0;
        color: #334155;
        font-size: 0.95rem;
        line-height: 1.4;
        max-width: 44rem;
      }

      .availability-chip {
        display: inline-block;
        border: 1px solid #0f766e;
        border-radius: 999px;
        padding: 0.3rem 0.7rem;
        background: #ecfeff;
        color: #115e59;
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.02em;
        text-transform: uppercase;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.001ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.001ms !important;
          scroll-behavior: auto !important;
        }
      }

  <body>
    <a class="skip-link" href="#home">Skip to main content</a>
    <div id="root"></div>
    <script>
      (function () {
        var wasModalOpen = false;
        var previouslyFocusedElement = null;

        function ensureButtonBehavior(el) {
          if (!el || el.dataset.a11yPatched === "1") {
            return;
          }

          el.dataset.a11yPatched = "1";
          if (!el.hasAttribute("tabindex")) {
            el.setAttribute("tabindex", "0");
          }
          el.setAttribute("role", "button");

          el.addEventListener("keydown", function (event) {
            if (event.key === "Enter" || event.key === " ") {
              event.preventDefault();
              el.click();
            }
          });
        }

        function setAriaCurrentFromHash() {
          var links = document.querySelectorAll('nav a[href^="#"]');
          if (!links.length) {
            return;
          }

          var hash = window.location.hash || "#home";
          links.forEach(function (link) {
            if (link.getAttribute("href") === hash) {
              link.setAttribute("aria-current", "page");
            } else {
              link.removeAttribute("aria-current");
            }
          });
        }

        function patchInteractiveElements() {
          var scrollDownAnchor = document.querySelector('a img[alt="Scroll Down"]');
          if (scrollDownAnchor && scrollDownAnchor.parentElement && scrollDownAnchor.parentElement.tagName === "A") {
            var scrollLink = scrollDownAnchor.parentElement;
            if (!scrollLink.getAttribute("href")) {
              scrollLink.setAttribute("href", "#work");
            }
            scrollLink.setAttribute("aria-label", "Scroll to portfolio section");
          }

          var clickableCards = Array.from(document.querySelectorAll("div.group.cursor-pointer"));
          clickableCards.forEach(function (card) {
            if (card.querySelector("p") && card.textContent.indexOf("Click to view more") !== -1) {
              ensureButtonBehavior(card);
              card.setAttribute("aria-label", "Open project details");
            }
          });

          setAriaCurrentFromHash();
        }

        function optimizeImageDelivery() {
          var images = Array.from(document.querySelectorAll("img"));
          if (!images.length) {
            return;
          }

          images.forEach(function (img) {
            if (img.dataset.imageOptimized === "1") {
              return;
            }

            var isCritical = !!img.closest("#home, nav, .canvasContainer");

            if (isCritical) {
              if (!img.hasAttribute("loading")) {
                img.setAttribute("loading", "eager");
              }
              if (!img.hasAttribute("fetchpriority")) {
                img.setAttribute("fetchpriority", "high");
              }
            } else {
              img.setAttribute("loading", "lazy");
              img.setAttribute("decoding", "async");
              img.setAttribute("fetchpriority", "low");
            }

            if (!img.hasAttribute("sizes")) {
              if (img.closest(".grid")) {
                img.setAttribute("sizes", "(max-width: 640px) 100vw, (max-width: 1024px) 50vw, 33vw");
              } else if (img.className.indexOf("w-full") !== -1) {
                img.setAttribute("sizes", "(max-width: 1024px) 100vw, 80vw");
              }
            }

            img.dataset.imageOptimized = "1";
          });
        }

        function injectPrimarySectionCtas() {
          var sectionIds = ["work", "about", "services", "tech-stack"];

          sectionIds.forEach(function (sectionId) {
            var section = document.getElementById(sectionId);
            if (!section) {
              return;
            }

            if (section.querySelector(".section-cta-wrap")) {
              return;
            }

            var wrap = document.createElement("div");
            wrap.className = "section-cta-wrap";

            var ctaLink = document.createElement("a");
            ctaLink.className = "section-cta";
            ctaLink.href = "#contact";
            ctaLink.textContent = "Let\'s Work Together";
            ctaLink.setAttribute("aria-label", "Jump to contact section");

            wrap.appendChild(ctaLink);
            section.appendChild(wrap);
          });
        }

        function injectTopFoldMessaging() {
          var homeSection = document.getElementById("home");
          if (!homeSection) {
            return;
          }

          if (homeSection.querySelector(".topfold-message")) {
            return;
          }

          var targetContainer =
            homeSection.querySelector(".heroText") ||
            homeSection.querySelector("h1") && homeSection.querySelector("h1").parentElement ||
            homeSection;

          if (!targetContainer) {
            return;
          }

          var messageWrap = document.createElement("div");
          messageWrap.className = "topfold-message";

          var valueProp = document.createElement("p");
          valueProp.className = "topfold-value-prop";
          valueProp.textContent =
            "I design and build accessible, performance-focused web experiences that turn ideas into production-ready products.";

          var availability = document.createElement("span");
          availability.className = "availability-chip";
          availability.textContent = "Available for full-time and freelance work";

          messageWrap.appendChild(valueProp);
          messageWrap.appendChild(availability);
          targetContainer.appendChild(messageWrap);
        }

        function closeOpenModalWithEscape() {
          var closeButton = document.querySelector('button[aria-label="Close"]');
          if (closeButton) {
            closeButton.click();
            return;
          }

          var backdrop = document.querySelector('.fixed.inset-0.bg-black\/70.z-10');
          if (backdrop) {
            backdrop.click();
          }
        }

        function getActiveModalRoot() {
          return document.querySelector(".fixed.inset-0.z-40");
        }

        function syncModalFocusState() {
          var modalRoot = getActiveModalRoot();
          var isModalOpen = !!modalRoot;

          if (isModalOpen && !wasModalOpen) {
            previouslyFocusedElement = document.activeElement;
            window.setTimeout(function () {
              var closeButton = modalRoot.querySelector('button[aria-label="Close"]');
              if (closeButton && typeof closeButton.focus === "function") {
                closeButton.focus();
              }
            }, 0);
          }

          if (!isModalOpen && wasModalOpen) {
            if (
              previouslyFocusedElement &&
              typeof previouslyFocusedElement.focus === "function" &&
              document.contains(previouslyFocusedElement)
            ) {
              previouslyFocusedElement.focus();
            } else {
              var skipLink = document.querySelector(".skip-link");
              if (skipLink && typeof skipLink.focus === "function") {
                skipLink.focus();
              }
            }
          }

          wasModalOpen = isModalOpen;
        }

        function trapFocusInModal(event) {
          var modalRoot = getActiveModalRoot();
          if (!modalRoot) {
            return;
          }

          var focusableElements = Array.from(
            modalRoot.querySelectorAll(
              'a[href], button:not([disabled]), [tabindex]:not([tabindex="-1"]), input:not([disabled]), select:not([disabled]), textarea:not([disabled])'
            )
          );

          if (!focusableElements.length) {
            return;
          }

          var first = focusableElements[0];
          var last = focusableElements[focusableElements.length - 1];

          if (!modalRoot.contains(document.activeElement)) {
            event.preventDefault();
            first.focus();
            return;
          }

          if (event.shiftKey && document.activeElement === first) {
            event.preventDefault();
            last.focus();
            return;
          }

          if (!event.shiftKey && document.activeElement === last) {
            event.preventDefault();
            first.focus();
          }
        }

        function handleGlobalKeyboard(event) {
          if (event.key === "Escape") {
            event.preventDefault();
            closeOpenModalWithEscape();
            return;
          }

          if (event.key === "Tab") {
            trapFocusInModal(event);
          }
        }

        function mountCanvasFallback(container, reasonText) {
          if (!container || container.dataset.fallbackMounted === "1") {
            return;
          }

          container.dataset.fallbackMounted = "1";
          container.innerHTML = "";

          var fallbackWrap = document.createElement("div");
          fallbackWrap.setAttribute(
            "style",
            "display:flex;flex-direction:column;align-items:center;gap:0.75rem;padding:1rem;"
          );

          var fallbackImg = document.createElement("img");
          fallbackImg.className = "rm-fallback-image";
          fallbackImg.src = "/miku.png";
          fallbackImg.alt = "Hero visual fallback image";

          var fallbackText = document.createElement("p");
          fallbackText.textContent = reasonText;
          fallbackText.setAttribute(
            "style",
            "font-size:0.875rem;color:#374151;text-align:center;max-width:32rem;"
          );

          fallbackWrap.appendChild(fallbackImg);
          fallbackWrap.appendChild(fallbackText);
          container.appendChild(fallbackWrap);
        }

        function applyReducedMotionAndFailureFallback() {
          var prefersReducedMotion =
            window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
          var canvasContainer = document.querySelector(".canvasContainer");

          if (!canvasContainer) {
            return;
          }

          if (prefersReducedMotion) {
            mountCanvasFallback(
              canvasContainer,
              "3D animation is reduced to respect your motion preferences."
            );
            return;
          }

          window.setTimeout(function () {
            var hasCanvas = !!canvasContainer.querySelector("canvas");
            if (!hasCanvas) {
              mountCanvasFallback(
                canvasContainer,
                "The 3D model could not be loaded right now. Showing a fallback visual instead."
              );
            }
          }, 7000);
        }

        var observer = new MutationObserver(function () {
          patchInteractiveElements();
          optimizeImageDelivery();
          injectPrimarySectionCtas();
          injectTopFoldMessaging();
          syncModalFocusState();
        });

        observer.observe(document.documentElement, {
          subtree: true,
          childList: true,
          attributes: false,
        });

        window.addEventListener("hashchange", setAriaCurrentFromHash);
        window.addEventListener("keydown", handleGlobalKeyboard);
        window.addEventListener("load", function () {
          patchInteractiveElements();
          optimizeImageDelivery();
          injectPrimarySectionCtas();
          injectTopFoldMessaging();
          syncModalFocusState();
          applyReducedMotionAndFailureFallback();
        });
      })();
    </script>
