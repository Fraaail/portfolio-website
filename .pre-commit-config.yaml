repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json
      - id: check-xml

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        files: "\\.(md|html|json|ya?ml)$"
        exclude: "^(assets/|pc_portfolio/|portfolio_pc/|node_modules/|case-studies/.*\\.pdf$)"

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.18.1
    hooks:
      - id: markdownlint-cli2
        args:
          - '--config'
          - '.markdownlint.json'

  - repo: local
    hooks:
      - id: node-check-visual-regression
        name: node --check visual-regression/check.js
        entry: bash -lc 'node --check visual-regression/check.js'
        language: system
        pass_filenames: false
        files: "^visual-regression/check\\.js$"
